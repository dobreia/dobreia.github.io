<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Cinzel">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Cormorant">
    <link rel="icon" type="image/x-icon" href="/assets/favicon.png">
    <link rel="stylesheet" href="./styles/index.css">
    <title>Naomi Club Budapest</title>
</head>

<body>
    <section id="navbar">
        <img id="nav-logo" src="./assets/logo.png" alt="logo">
    </section>

    <section id="landing-container" class="container-lg">
        <div class="row">
            <div class="col-12 col-md-6">
                <h1 id="main-text">Naomi Club</h1><br>
                <h2 id="second-text">for gentlemen</h2>
            </div>
            <div class="col-12 col-md-6">
                <img id="landing-img" src="./assets/landing-img.jpg" alt="">
            </div>
        </div>
    </section>

    <section id="landing-gallery" class="container-lg">
        <div class="row">
            <div class="col-6 col-md-4">
                <img src="./assets/landing-gallery1.jpg" alt="">
            </div>
            <div class="col-6 col-md-4">
                <img src="./assets/landing-gallery2.jpeg" alt="">
            </div>
            <div class="col-6 col-md-4">
                <img src="./assets/landing-gallery3.jpg" alt="">
            </div>
            <div class="col-6 col-md-4">
                <img src="./assets/landing-gallery4.jpg" alt="">
            </div>
            <div class="col-6 col-md-4">
                <img src="./assets/landing-gallery5.jpg" alt="">
            </div>
            <div class="col-6 col-md-4">
                <img src="./assets/landing-gallery6.jpg" alt="">
            </div>
        </div>
        <a id="gallery-link" href="gallery.html">
            <button id="gallery-button">
                <h3>További képek</h3>
            </button>
        </a>
    </section>
    <section id="contact">
        <h2>Kapcsolat</h2>
        <iframe id="map"
            src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d673.8686857698033!2d19.06781632846934!3d47.500144998191274!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x4741dc6614224eff%3A0x5061580e4346e8c7!2sBudapest%2C%20Wessel%C3%A9nyi%20utca%2043%2C%201077!5e0!3m2!1shu!2shu!4v1710436082520!5m2!1shu!2shu"></iframe>
        <article id="social-container">
            <a href="https://www.facebook.com/naomiclubbudapest"><img id="fb-logo" src="./assets/fb-icon.svg"
                    alt=""></a>
            <a href="https://www.instagram.com/naomiclubbudapest"><img id="instagram-logo"
                    src="./assets/instagram-logo.svg" alt=""></a>
        </article>
    </section>
    <section id="footer"></section>

</html>
